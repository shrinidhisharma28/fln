<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Class 1 Math Practice Worksheet Generator — FLN</title>
<style>
  *{box-sizing:border-box;}
  body{font-family:Arial,Helvetica,sans-serif;background:#e9e9e9;color:#000;margin:0;padding:0;}
  .toolbar{background:#fff;border-bottom:2px solid #000;padding:14px 18px;display:flex;flex-wrap:wrap;align-items:center;gap:14px;position:sticky;top:0;z-index:50;}
  .toolbar h1{font-size:18px;margin:0;margin-right:10px;}
  .toolbar label{font-size:14px;}
  .toolbar input[type=number]{width:64px;padding:5px 6px;border:1px solid #000;font-family:inherit;font-size:14px;}
  .btn{background:#fff;border:1.5px solid #000;color:#000;padding:7px 16px;font-size:14px;font-family:inherit;cursor:pointer;border-radius:3px;}
  .btn:hover{background:#000;color:#fff;}
  .btn:disabled{opacity:0.4;cursor:not-allowed;}
  .btn:disabled:hover{background:#fff;color:#000;}
  #exportProgress{font-size:12.5px;color:#000;min-width:160px;}
  .tabbar{background:#f3f3f3;border-bottom:2px solid #000;padding:8px 10px 0 10px;display:flex;flex-wrap:wrap;gap:4px;position:sticky;top:64px;z-index:49;max-height:120px;overflow-y:auto;}
  .tabbtn{background:#ddd;border:1px solid #000;border-bottom:none;padding:6px 14px;font-size:13px;font-family:inherit;cursor:pointer;border-radius:4px 4px 0 0;}
  .tabbtn.active{background:#fff;font-weight:bold;}
  #setsContainer{padding:20px;display:flex;justify-content:center;}
  .worksheet{display:none;}
  .worksheet.active{display:block;}
  .page{background:#fff;width:210mm;min-height:296mm;padding:12mm 14mm;border:1px solid #999;box-shadow:0 0 10px rgba(0,0,0,0.15);}
  .ws-header{text-align:center;border-bottom:3px solid #000;padding-bottom:8px;margin-bottom:10px;}
  .ws-title{font-size:20px;font-weight:bold;}
  .ws-sub{font-size:15px;margin-top:2px;font-weight:bold;}
  .ws-fields{display:flex;justify-content:space-between;font-size:13px;margin-top:10px;flex-wrap:wrap;gap:6px;}
  .ws-fields span{border-bottom:1px solid #000;padding:0 4px 2px 4px;min-width:120px;display:inline-block;}
  .section{margin:10px 0 14px 0;}
  .qinstr{font-size:14px;font-weight:bold;margin:0 0 6px 0;}
  .matchwrap{display:flex;justify-content:space-between;gap:16px;}
  .matchcol{flex:1;}
  .matchitem{display:flex;align-items:center;justify-content:space-between;margin:8px 0;}
  .matchitem .micontent{display:flex;align-items:center;gap:6px;font-size:13px;}
  .dot{width:10px;height:10px;border:1.4px solid #000;border-radius:50%;background:#fff;flex-shrink:0;}
  .imgbox{border:1.5px solid #000;padding:5px;display:inline-flex;align-items:center;justify-content:center;}
  .group-compare{display:flex;align-items:center;gap:16px;margin:4px 0;}
  .group-box{border:2px solid #000;padding:6px 8px;display:flex;flex-wrap:wrap;gap:3px;align-items:center;min-width:80px;min-height:52px;justify-content:center;}
  .qrow{margin:6px 0;font-size:12.5px;font-style:italic;}
  .pair-box{border:2px solid #000;padding:6px;display:flex;flex-wrap:wrap;gap:3px;align-items:center;justify-content:center;min-width:76px;min-height:64px;}
  .container-row{display:flex;gap:28px;align-items:flex-end;justify-content:center;margin:8px 0;}
  .container-item{display:flex;flex-direction:column;align-items:center;gap:5px;}
  .tickbox{display:inline-block;border:2px solid #000;width:28px;height:28px;}
  .coin-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;padding:6px 0;}
  .basket-row{display:flex;gap:24px;justify-content:center;align-items:flex-end;flex-wrap:wrap;margin:6px 0;}
  .basket-item{display:flex;flex-direction:column;align-items:center;gap:3px;}
  .basket-label{font-size:16px;font-weight:bold;}
  .ws-footer{margin-top:12px;border-top:1.4px solid #000;padding-top:5px;font-size:11px;text-align:center;color:#333;}
  @media print{
    body{background:#fff;}
    .no-print{display:none !important;}
    #setsContainer{padding:0;display:block;}
    .page{box-shadow:none;border:none;width:auto;min-height:0;padding:8mm 10mm;}
    .worksheet{display:none;}
    .worksheet.active{display:block;}
  }
  @page{size:A4;margin:8mm;}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
<div class="toolbar no-print">
  <h1>Class 1 — Math Worksheet Generator (FLN)</h1>
  <label>Number of sets: <input type="number" id="setCount" min="1" max="100" value="5"></label>
  <button class="btn" id="generateBtn">Generate</button>
  <button class="btn" id="printBtn">Print current set</button>
  <button class="btn" id="exportAllBtn">Download All Sets (separate PDFs)</button>
  <span id="exportProgress" class="no-print"></span>
  <span style="font-size:12px;color:#555;">Black &amp; white, A4 ready.</span>
</div>
<div class="tabbar no-print" id="tabbar"></div>
<div id="setsContainer"></div>
<div id="pdfRenderRoot" style="position:fixed;left:-99999px;top:0;width:210mm;background:#fff;"></div>

<script>
/* ── UTILS ── */
function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function sh(a){const r=a.slice();for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function sp(a,n){return sh(a).slice(0,n);}
function pk(a){return a[ri(0,a.length-1)];}

/* ── SVG HELPERS ── */
function sw(inner,size){return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">'+inner+'</svg>';}
// kawaii face: cx,cy = centre of face area, s = scale 0..1
function kf(cx,cy,s){
  s=s||1;
  return '<circle cx="'+(cx-6*s)+'" cy="'+(cy-3*s)+'" r="'+(2.2*s)+'" fill="#000"/>'+
         '<circle cx="'+(cx+6*s)+'" cy="'+(cy-3*s)+'" r="'+(2.2*s)+'" fill="#000"/>'+
         '<path d="M'+(cx-7*s)+','+(cy+3*s)+' Q'+cx+','+(cy+9*s)+' '+(cx+7*s)+','+(cy+3*s)+'" fill="none" stroke="#000" stroke-width="'+(1.8*s)+'"/>';
}

/* ── ICON LIBRARY ── */
const IC={
  /* SHAPES — clean, no face */
  circle:   (z)=>sw('<circle cx="50" cy="50" r="40" fill="#fff" stroke="#000" stroke-width="4"/>',z),
  square:   (z)=>sw('<rect x="10" y="10" width="80" height="80" rx="3" fill="#fff" stroke="#000" stroke-width="4"/>',z),
  triangle: (z)=>sw('<polygon points="50,8 92,91 8,91" fill="#fff" stroke="#000" stroke-width="4"/>',z),
  rectangle:(z)=>sw('<rect x="5" y="22" width="90" height="56" rx="3" fill="#fff" stroke="#000" stroke-width="4"/>',z),

  /* CIRCLE real-life */
  clock:(z)=>sw(
    '<circle cx="50" cy="50" r="40" fill="#fff" stroke="#000" stroke-width="3.5"/>'+
    Array.from({length:12},(_,i)=>{const a=i*30*Math.PI/180;const x1=50+32*Math.sin(a),y1=50-32*Math.cos(a),x2=50+38*Math.sin(a),y2=50-38*Math.cos(a);return '<line x1="'+x1.toFixed(1)+'" y1="'+y1.toFixed(1)+'" x2="'+x2.toFixed(1)+'" y2="'+y2.toFixed(1)+'" stroke="#000" stroke-width="1.8"/>';}).join('')+
    '<line x1="50" y1="50" x2="50" y2="24" stroke="#000" stroke-width="3.5" stroke-linecap="round"/>'+
    '<line x1="50" y1="50" x2="66" y2="60" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>'+
    '<circle cx="50" cy="50" r="3" fill="#000"/>'+
    kf(50,70,0.65),z),

  soccerBall:(z)=>sw(
    '<circle cx="50" cy="50" r="40" fill="#fff" stroke="#000" stroke-width="3"/>'+
    '<polygon points="50,12 62,36 89,36 68,54 75,80 50,63 25,80 32,54 11,36 38,36" fill="#000" stroke="#000" stroke-width="1"/>'+
    '<circle cx="50" cy="50" r="40" fill="none" stroke="#000" stroke-width="3"/>',z),

  plate:(z)=>sw(
    '<ellipse cx="50" cy="56" rx="42" ry="13" fill="#fff" stroke="#000" stroke-width="2.5"/>'+
    '<ellipse cx="50" cy="50" rx="42" ry="28" fill="#fff" stroke="#000" stroke-width="3"/>'+
    '<ellipse cx="50" cy="48" rx="20" ry="10" fill="none" stroke="#000" stroke-width="1.8"/>'+
    kf(50,52,0.72),z),

  button:(z)=>sw(
    '<circle cx="50" cy="50" r="40" fill="#fff" stroke="#000" stroke-width="3"/>'+
    '<circle cx="50" cy="50" r="27" fill="none" stroke="#000" stroke-width="1.5"/>'+
    '<circle cx="42" cy="44" r="3.5" fill="#000"/><circle cx="58" cy="44" r="3.5" fill="#000"/>'+
    '<circle cx="42" cy="56" r="3.5" fill="#000"/><circle cx="58" cy="56" r="3.5" fill="#000"/>',z),

  /* SQUARE real-life */
  window:(z)=>sw(
    '<rect x="8" y="12" width="84" height="78" rx="3" fill="#fff" stroke="#000" stroke-width="3.5"/>'+
    '<line x1="50" y1="12" x2="50" y2="90" stroke="#000" stroke-width="2.5"/>'+
    '<line x1="8" y1="51" x2="92" y2="51" stroke="#000" stroke-width="2.5"/>'+
    '<rect x="8" y="88" width="84" height="8" fill="#fff" stroke="#000" stroke-width="2"/>'+
    kf(30,36,0.65),z),

  dice:(z)=>sw(
    '<rect x="8" y="8" width="84" height="84" rx="10" fill="#fff" stroke="#000" stroke-width="3.5"/>'+

    '<circle cx="50" cy="50" r="6" fill="#000"/>'+
    '<circle cx="30" cy="70" r="6" fill="#000"/><circle cx="70" cy="70" r="6" fill="#000"/>',z),

  giftBox:(z)=>sw(
    '<rect x="12" y="42" width="76" height="50" rx="3" fill="#fff" stroke="#000" stroke-width="3"/>'+

    '<line x1="50" y1="30" x2="50" y2="92" stroke="#000" stroke-width="3"/>'+
    '<path d="M50,30 C36,18 22,20 26,30" fill="none" stroke="#000" stroke-width="2.5"/>'+
    '<path d="M50,30 C64,18 78,20 74,30" fill="none" stroke="#000" stroke-width="2.5"/>'+
    kf(50,74,0.8),z),

  /* TRIANGLE real-life */
  iceCream:(z)=>sw(

    '<path d="M22,50 L50,92 L78,50" fill="#fff" stroke="#000" stroke-width="3" stroke-linejoin="round"/>'+

    '<line x1="26" y1="56" x2="34" y2="48" stroke="#000" stroke-width="1.2"/>'+
    '<line x1="38" y1="62" x2="46" y2="54" stroke="#000" stroke-width="1.2"/>'+
    '<line x1="50" y1="66" x2="58" y2="58" stroke="#000" stroke-width="1.2"/>'+
    '<line x1="62" y1="60" x2="70" y2="52" stroke="#000" stroke-width="1.2"/>'+
    kf(50,38,0.82),z),

  partyHat:(z)=>sw(
    '<polygon points="50,6 84,90 16,90" fill="#fff" stroke="#000" stroke-width="3.5" stroke-linejoin="round"/>'+
    '<ellipse cx="50" cy="90" rx="34" ry="8" fill="#fff" stroke="#000" stroke-width="2.5"/>'+
    '<circle cx="50" cy="6" r="5" fill="#fff" stroke="#000" stroke-width="2"/>'+
    '<circle cx="38" cy="56" r="3" fill="#000"/><circle cx="56" cy="66" r="3" fill="#000"/><circle cx="46" cy="75" r="3" fill="#000"/>',z),

  warningSign:(z)=>sw(
    '<polygon points="50,6 95,90 5,90" fill="#fff" stroke="#000" stroke-width="3.5" stroke-linejoin="round"/>'+
    '<line x1="50" y1="35" x2="50" y2="64" stroke="#000" stroke-width="5.5" stroke-linecap="round"/>'+
    '<circle cx="50" cy="75" r="4" fill="#000"/>',z),

  /* RECTANGLE real-life */
  door:(z)=>sw(
    '<rect x="16" y="6" width="68" height="92" rx="3" fill="#fff" stroke="#000" stroke-width="3.5"/>'+
    '<rect x="24" y="14" width="52" height="36" fill="none" stroke="#000" stroke-width="2"/>'+
    '<rect x="24" y="56" width="52" height="34" fill="none" stroke="#000" stroke-width="2"/>'+
    '<circle cx="72" cy="52" r="4" fill="#000"/>'+kf(50,44,0.82),z),

  eraser:(z)=>sw(
    '<rect x="6" y="28" width="88" height="44" rx="7" fill="#fff" stroke="#000" stroke-width="3.5"/>'+
    '<line x1="34" y1="28" x2="34" y2="72" stroke="#000" stroke-width="2.5"/>'+
    '<rect x="6" y="28" width="28" height="44" rx="7" fill="none" stroke="#000" stroke-width="2"/>'+
    kf(64,56,0.78),z),

  book:(z)=>sw(
    '<path d="M8,18 C22,10 40,11 50,18 L50,88 C40,81 22,80 8,88 Z" fill="#fff" stroke="#000" stroke-width="2.5"/>'+
    '<path d="M92,18 C78,10 60,11 50,18 L50,88 C60,81 78,80 92,88 Z" fill="#fff" stroke="#000" stroke-width="2.5"/>'+
    '<line x1="16" y1="34" x2="40" y2="31" stroke="#000" stroke-width="1.3"/>'+
    '<line x1="16" y1="44" x2="40" y2="41" stroke="#000" stroke-width="1.3"/>'+
    '<line x1="16" y1="54" x2="40" y2="51" stroke="#000" stroke-width="1.3"/>'+
    '<rect x="38" y="14" width="24" height="20" rx="2" fill="none" stroke="#000" stroke-width="2"/>'+
    kf(74,56,0.72),z),

  /* ── COUNTING objects ── */
  apple:(z)=>sw(
    '<path d="M50,28 C26,26 13,52 23,74 C31,90 45,95 50,95 C55,95 69,90 77,74 C87,52 74,26 50,28 Z" fill="#fff" stroke="#000" stroke-width="3"/>'+
    '<path d="M50,28 C47,18 54,10 62,7" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>'+
    '<ellipse cx="64" cy="9" rx="5" ry="4" fill="#fff" stroke="#000" stroke-width="1.8"/>'+
    kf(50,62,0.92),z),

  star:(z)=>sw(
    '<polygon points="50,6 61,38 95,38 68,57 79,90 50,70 21,90 32,57 5,38 39,38" fill="#fff" stroke="#000" stroke-width="2.5"/>'+
    kf(50,63,0.72),z),

  flower:(z)=>sw(
    [0,60,120,180,240,300].map(a=>'<ellipse cx="50" cy="26" rx="10" ry="18" fill="#fff" stroke="#000" stroke-width="2.2" transform="rotate('+a+' 50 50)"/>').join('')+
    '<circle cx="50" cy="50" r="15" fill="#fff" stroke="#000" stroke-width="2.5"/>'+
    kf(50,53,0.76),z),

  balloon:(z)=>sw(
    '<ellipse cx="50" cy="40" rx="29" ry="34" fill="#fff" stroke="#000" stroke-width="3"/>'+
    '<path d="M44,74 L56,74 L50,82 Z" fill="#fff" stroke="#000" stroke-width="2"/>'+
    '<path d="M50,82 C46,88 55,93 50,98" fill="none" stroke="#000" stroke-width="1.8"/>'+
    '<line x1="42" y1="30" x2="38" y2="24" stroke="#000" stroke-width="1.5"/>'+
    kf(50,42,0.88),z),

  fish:(z)=>sw(
    '<ellipse cx="44" cy="52" rx="30" ry="18" fill="#fff" stroke="#000" stroke-width="3"/>'+
    '<path d="M72,52 L96,32 L96,72 Z" fill="#fff" stroke="#000" stroke-width="2.5"/>'+
    '<circle cx="26" cy="47" r="3.5" fill="#000"/>'+
    '<path d="M18,60 Q26,67 34,60" fill="none" stroke="#000" stroke-width="1.5"/>'+
    '<path d="M36,36 Q42,30 46,36 M36,68 Q42,62 46,68" fill="none" stroke="#000" stroke-width="1.5"/>',z),

  leaf:(z)=>sw(
    '<path d="M50,8 C76,26 82,60 50,94 C18,60 24,26 50,8 Z" fill="#fff" stroke="#000" stroke-width="3"/>'+
    '<line x1="50" y1="14" x2="50" y2="88" stroke="#000" stroke-width="1.8"/>'+
    '<path d="M50,32 L35,26 M50,32 L65,26 M50,52 L32,46 M50,52 L68,46 M50,70 L38,66 M50,70 L62,66" fill="none" stroke="#000" stroke-width="1.2"/>',z),

  bird:(z)=>sw(
    '<ellipse cx="46" cy="58" rx="24" ry="17" fill="#fff" stroke="#000" stroke-width="2.8"/>'+
    '<circle cx="68" cy="40" r="16" fill="#fff" stroke="#000" stroke-width="2.8"/>'+
    '<path d="M80,38 L97,34 L80,46 Z" fill="#fff" stroke="#000" stroke-width="2"/>'+
    '<circle cx="75" cy="36" r="2.5" fill="#000"/>'+
    '<path d="M36,58 L22,70 M38,63 L24,74" stroke="#000" stroke-width="2.5"/>'+
    '<path d="M60,58 L72,70 M58,63 L70,74" stroke="#000" stroke-width="2.5"/>',z),

  bee:(z)=>sw(
    '<ellipse cx="50" cy="60" rx="20" ry="26" fill="#fff" stroke="#000" stroke-width="2.8"/>'+
    '<line x1="32" y1="54" x2="68" y2="54" stroke="#000" stroke-width="2.2"/>'+
    '<line x1="30" y1="64" x2="70" y2="64" stroke="#000" stroke-width="2.2"/>'+
    '<line x1="32" y1="74" x2="68" y2="74" stroke="#000" stroke-width="2.2"/>'+
    '<ellipse cx="36" cy="36" rx="16" ry="9" fill="#fff" stroke="#000" stroke-width="2" transform="rotate(-30 36 36)"/>'+
    '<ellipse cx="64" cy="36" rx="16" ry="9" fill="#fff" stroke="#000" stroke-width="2" transform="rotate(30 64 36)"/>'+
    '<circle cx="50" cy="30" r="12" fill="#fff" stroke="#000" stroke-width="2.5"/>'+
    kf(50,31,0.58),z),

  /* ── PAIRED objects (Q5) ── */
  lock:(z)=>sw(
    '<rect x="20" y="48" width="60" height="46" rx="7" fill="#fff" stroke="#000" stroke-width="3.5"/>'+
    '<path d="M32,48 C32,28 68,28 68,48" fill="none" stroke="#000" stroke-width="4"/>'+
    '<circle cx="50" cy="68" r="8" fill="none" stroke="#000" stroke-width="3"/>'+
    '<line x1="50" y1="76" x2="50" y2="84" stroke="#000" stroke-width="3"/>'+
    kf(50,78,0.68),z),

  key:(z)=>sw(
    '<circle cx="28" cy="38" r="20" fill="#fff" stroke="#000" stroke-width="3.5"/>'+

  toothbrush:(z)=>sw(

  toothpaste:(z)=>sw(
    '<rect x="10" y="36" width="68" height="28" rx="6" fill="#fff" stroke="#000" stroke-width="3"/>'+

  shoe:(z)=>sw(
    '<path d="M8,72 C8,56 18,42 34,40 L56,40 L82,52 C94,58 94,68 90,74 L8,74 Z" fill="#fff" stroke="#000" stroke-width="3"/>'+

  sock:(z)=>sw(

    '<line x1="34" y1="36" x2="64" y2="36" stroke="#000" stroke-width="1.8"/>'+
    kf(49,46,0.76),z),

/* ── SECTION BUILDERS ── */
function section1(){
  const shapes=sh(SHAPE_MATCH).slice(0,4);
  const leftItems=shapes.map(s=>({key:s.shape,label:s.label}));
  const rightItems=shapes.map(s=>pk(s.objs));
  // ensure no duplicate right keys
  const used=new Set();
  const rightUniq=shapes.map(s=>{
    const opts=s.objs.filter(o=>!used.has(o[0]));
    const chosen=pk(opts.length?opts:s.objs);
    used.add(chosen[0]);return chosen;
  });
  const rightShuf=sh(rightUniq);
  let lH='',rH='';
  leftItems.forEach(({key,label})=>{
    lH+='<div class="matchitem"><div class="micontent"><div class="imgbox">'+ic(key,48)+'</div><span>'+label+'</span></div><span class="dot"></span></div>';
  });
  rightShuf.forEach(([key,label])=>{
    rH+='<div class="matchitem"><span class="dot"></span><div class="micontent"><div class="imgbox">'+ic(key,48)+'</div><span>'+label+'</span></div></div>';
  });
  return '<p class="qinstr">1) Match the objects that have the same shape by drawing lines.</p>'+
    '<div class="matchwrap"><div class="matchcol">'+lH+'</div><div class="matchcol">'+rH+'</div></div>';
}

function section2(){
  function row(iA,iB,q){
    const a=ri(2,5),b=ri(6,10);
    const order=Math.random()<0.5?[a,b]:[b,a];
    let gA='',gB='';
    for(let k=0;k<order[0];k++) gA+=ic(iA,26);
    for(let k=0;k<order[1];k++) gB+=ic(iB,26);
    return '<div class="group-compare"><div class="group-box">'+gA+'</div><div class="group-box">'+gB+'</div></div>'+
      '<div class="qrow">'+q+'</div>';
  }
  const icons=sh(COUNT_ICONS);
  return '<p class="qinstr">2) Circle the group as directed.</p>'+
    '<table style="width:100%;border-collapse:collapse;">'+
    '<tr><td style="border:1.4px solid #000;padding:5px 8px;">'+row(icons[0],icons[1],'Circle the group that has MORE.')+'</td>'+
    '<td style="border:1.4px solid #000;padding:5px 8px;">'+row(icons[2],icons[3],'Circle the group that has MORE.')+'</td></tr>'+
    '<tr><td style="border:1.4px solid #000;padding:5px 8px;">'+row(icons[4],icons[5],'Circle the group that has LESS.')+'</td>'+
    '<td style="border:1.4px solid #000;padding:5px 8px;">'+row(icons[6],icons[7],'Circle the group that has LESS.')+'</td></tr>'+
    '</table>';
}

function section3(){
  // Original concept: match groups in boxes by EQUAL COUNT
  const counts=sh([2,3,4,5,6,7]);
  const icons=sh(COUNT_ICONS);
  const N=4;
  const leftItems=Array.from({length:N},(_,i)=>({ic:icons[i],cnt:counts[i]}));
  const rightItems=Array.from({length:N},(_,i)=>({ic:icons[i+4]||icons[i+1],cnt:counts[i]}));
  const rightShuf=sh(rightItems);
  let lH='',rH='';
  leftItems.forEach(({ic:ico,cnt})=>{
    let imgs='';for(let k=0;k<cnt;k++) imgs+=IC[ico](22);
    lH+='<div class="matchitem"><div class="micontent"><div class="pair-box">'+imgs+'</div></div><span class="dot"></span></div>';
  });
  rightShuf.forEach(({ic:ico,cnt})=>{
    let imgs='';for(let k=0;k<cnt;k++) imgs+=IC[ico](22);
    rH+='<div class="matchitem"><span class="dot"></span><div class="micontent"><div class="pair-box">'+imgs+'</div></div></div>';
  });
  return '<p class="qinstr">3) Draw lines to match each group that has the same number of objects.</p>'+
    '<div class="matchwrap"><div class="matchcol">'+lH+'</div><div class="matchcol">'+rH+'</div></div>';
}

function buildWorksheetHTML(setNum){
  const builders=[section1,section2,section3,section4,section5,section6,section7,section8,section9];
  let sHtml='';
  builders.forEach(fn=>{ sHtml+='<div class="section">'+fn()+'</div>'; });

/* ── APP LOGIC ── */
let worksheetHTMLs=[],inserted=[];
function generateSets(n){
  n=Math.max(1,Math.min(100,n|0));
  worksheetHTMLs=[];
  for(let i=0;i<n;i++) worksheetHTMLs.push(buildWorksheetHTML(i+1));
  inserted=new Array(n).fill(false);
  const tabbar=document.getElementById('tabbar');tabbar.innerHTML='';
  for(let i=1;i<=n;i++){
    const btn=document.createElement('button');btn.className='tabbtn';btn.id='tabbtn-'+i;
    btn.textContent='Set '+i;btn.addEventListener('click',()=>activateSet(i));tabbar.appendChild(btn);
  }
  const container=document.getElementById('setsContainer');container.innerHTML='';
  for(let i=1;i<=n;i++){const div=document.createElement('div');div.className='worksheet';div.id='ws-'+i;container.appendChild(div);}
  activateSet(1);
}
function activateSet(num){
  document.querySelectorAll('.worksheet').forEach(w=>w.classList.remove('active'));
  document.querySelectorAll('.tabbtn').forEach(b=>b.classList.remove('active'));
  const div=document.getElementById('ws-'+num);if(!div) return;
  if(!inserted[num-1]){div.innerHTML=worksheetHTMLs[num-1];inserted[num-1]=true;}
  div.classList.add('active');
  const btn=document.getElementById('tabbtn-'+num);if(btn) btn.classList.add('active');
}
document.getElementById('generateBtn').addEventListener('click',()=>{
  const n=parseInt(document.getElementById('setCount').value,10)||1;generateSets(n);
});
document.getElementById('printBtn').addEventListener('click',()=>window.print());
generateSets(parseInt(document.getElementById('setCount').value,10)||5);

/* ── PDF EXPORT ── */
function computePdfSlices(imgW,imgH,mmW,mmH){
  const pxMM=imgW/mmW,phPx=Math.max(1,Math.round(mmH*pxMM));
  const slices=[];let y=0;
  while(y<imgH){const h=Math.min(phPx,imgH-y);slices.push({sy:y,sh:h,mmH:h/pxMM});y+=h;}
  return slices;
}
function sliceCanvas(src,sy,sh){const c=document.createElement('canvas');c.width=src.width;c.height=sh;c.getContext('2d').drawImage(src,0,sy,src.width,sh,0,0,src.width,sh);return c;}
async function buildPdfBlobForSet(i){
  const rr=document.getElementById('pdfRenderRoot');rr.innerHTML=worksheetHTMLs[i-1];
  await new Promise(r=>requestAnimationFrame(r));await new Promise(r=>requestAnimationFrame(r));
  const pe=rr.querySelector('.page');
  const cv=await html2canvas(pe,{scale:2,backgroundColor:'#ffffff'});
  const pdf=new window.jspdf.jsPDF({unit:'mm',format:'a4'});
  const slices=computePdfSlices(cv.width,cv.height,210,297);
  slices.forEach((s,idx)=>{const sc=sliceCanvas(cv,s.sy,s.sh);const d=sc.toDataURL('image/png');if(idx>0)pdf.addPage();pdf.addImage(d,'PNG',0,0,210,s.mmH);});
  rr.innerHTML='';return pdf.output('blob');
}
async function exportAllSetsAsZip(){
  if(!worksheetHTMLs.length){alert('Generate at least one set first.');return;}
  const eb=document.getElementById('exportAllBtn'),gb=document.getElementById('generateBtn'),pr=document.getElementById('exportProgress');
  const n=worksheetHTMLs.length;eb.disabled=true;gb.disabled=true;
  try{
    const zip=new JSZip(),pw=String(n).length;
    for(let i=1;i<=n;i++){
      pr.textContent='Building PDF '+i+' of '+n+' …';
      zip.file('Set_'+String(i).padStart(pw,'0')+'.pdf',await buildPdfBlobForSet(i));
      await new Promise(r=>setTimeout(r,0));
    }
    pr.textContent='Packaging ZIP …';
    const zb=await zip.generateAsync({type:'blob'});
    const url=URL.createObjectURL(zb);const a=document.createElement('a');a.href=url;a.download='Class1_Math_Worksheets_AllSets.zip';
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    pr.textContent='Done — '+n+' PDFs in ZIP.';
  }catch(e){console.error(e);pr.textContent='Export failed.';}
  finally{eb.disabled=false;gb.disabled=false;}
}
document.getElementById('exportAllBtn').addEventListener('click',exportAllSetsAsZip);
</script>
